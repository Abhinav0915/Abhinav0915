name: 3D City Contribution Graph

on:
  schedule:
    - cron: "0 2 * * *"   # Runs daily at 2am UTC
  workflow_dispatch:        # Allows manual trigger from GitHub UI
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D City SVG

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate 3D City Graph
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Output file saved to repo root
          filename: profile-3d-city.svg

          # User to generate metrics for
          user: abhinav0915

          # Only the isocalendar plugin — no base sections
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Render as a clean, borderless SVG
          config_display: large
          config_padding: 0, 8 + 0%
